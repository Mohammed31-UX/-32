<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برينت فلو | منظم الصور الذكي للطباعة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-purple: #4914c6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        *::-webkit-scrollbar {
            width: 6px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 20px;
        }

        body {
            font-family: 'Tajawal', 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
        }

        /* ===== GLASSMORPHISM NAVBAR ===== */
        .navbar {
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-success { background: var(--accent-green); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-danger { background: var(--accent-red); color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); }
        .btn-outline:hover { background: var(--glass-border); }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 73px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--glass-border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 1.25rem;
            transition: border-color 0.3s;
        }

        .panel:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input, select {
            background: #0f172a;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .preset-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 1rem;
        }

        .chip {
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--glass-border);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .chip:hover {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
        }

        .chip.active {
            background: var(--primary);
            color: white;
        }

        /* ===== UPLOAD BOX ===== */
        .upload-box {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-box i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .upload-box p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ===== IMAGE LIST ===== */
        .image-manager {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .image-row {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--glass-border);
            animation: slideIn 0.3s ease-out;
        }

        .image-row-main {
            display: grid;
            grid-template-columns: 50px 1fr 80px 40px;
            align-items: center;
            gap: 12px;
        }

        .text-settings-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            border: 1px solid var(--glass-border);
        }

        .text-settings-panel.active {
            display: grid;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .image-row img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }

        .image-row .name {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .copies-input {
            width: 100%;
            padding: 4px 6px;
            font-size: 0.8rem;
            text-align: center;
        }

        .remove-btn {
            color: var(--accent-red);
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== PREVIEW AREA ===== */
        .preview-pane {
            padding: 3rem;
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0b1121;
            position: relative;
        }

        .preview-controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .zoom-btn {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.3s;
        }

        .zoom-btn:hover {
            background: var(--glass-border);
        }

        /* ===== THE PAPER ===== */
        .paper-canvas {
            background: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            transform-origin: top center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .paper-grid {
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            box-sizing: border-box;
            position: relative;
        }

        .safe-area-guide {
            position: absolute;
            top: var(--mt);
            left: var(--ml);
            right: var(--mr);
            bottom: var(--mb);
            border: 1px dashed rgba(59, 130, 246, 0.3);
            pointer-events: none;
            display: block;
        }

        .img-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        .img-cell img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            transition: filter 0.3s;
        }

        /* Crop Marks */
        .crop-mark {
            position: absolute;
            width: 10px;
            height: 10px;
            border-color: #ccc;
            border-style: solid;
            pointer-events: none;
            z-index: 5;
            display: none;
        }
        .show-crop-marks .crop-mark { display: block; }
        .cm-tl { top: -5px; left: -5px; border-width: 1px 0 0 1px; }
        .cm-tr { top: -5px; right: -5px; border-width: 1px 1px 0 0; }
        .cm-bl { bottom: -5px; left: -5px; border-width: 0 0 1px 1px; }
        .cm-br { bottom: -5px; right: -5px; border-width: 0 1px 1px 0; }

        .qr-overlay {
            position: absolute;
            background: white;
            padding: 2px;
            z-index: 15;
            pointer-events: none;
        }

        .device-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; /* Frame sits on top */
            pointer-events: none;
            object-fit: contain;
        }

        .img-with-frame {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent;
        }

        .img-with-frame img:not(.device-frame) {
            position: absolute;
            z-index: 1; /* Image sits behind */
            width: 100%;
            height: 100%;
        }

        .img-label {
            position: absolute;
            padding: 2px 6px;
            font-weight: 700;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1;
        }

        /* Positions */
        .pos-top { top: 5px; left: 50%; transform: translateX(-50%); }
        .pos-bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .pos-tl { top: 5px; left: 5px; }
        .pos-tr { top: 5px; right: 5px; }
        .pos-bl { bottom: 5px; left: 5px; }
        .pos-br { bottom: 5px; right: 5px; }

        /* ===== STATS BAR ===== */
        .stats-bar {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            z-index: 100;
        }

        /* ===== LOADING MODAL ===== */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1000px) {
            .main-container { grid-template-columns: 1fr; height: auto; }
            .sidebar { width: 100%; border-left: none; border-bottom: 1px solid var(--glass-border); }
            .preview-pane { min-height: 80vh; }
        }

        /* Print Hiding */
        @media print {
            body * { visibility: hidden; }
            .paper-canvas, .paper-canvas * { visibility: visible; }
            .paper-canvas { position: absolute; left: 0; top: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">📐</div>
            <h1>برينت فلو | PrintFlow</h1>
        </div>
        <div class="nav-actions">
            <button class="btn btn-outline" onclick="saveProject()">
                <span>💾</span> حفظ المشروع
            </button>
            <button class="btn btn-outline" onclick="document.getElementById('project-input').click()">
                <span>📂</span> فتح مشروع
                <input type="file" id="project-input" accept=".json" style="display:none" onchange="loadProject(this)">
            </button>
            <button class="btn btn-outline" onclick="resetAll()">
                <span>🔄</span> مسح الإعدادات
            </button>
            <button class="btn btn-primary" onclick="window.print()">
                <span>🖨️</span> طباعة
            </button>
            <button class="btn btn-success" onclick="exportPDF()">
                <span>📄</span> تصدير PDF
            </button>
        </div>
    </nav>

    <main class="main-container">
        <!-- Sidebar Settings -->
        <aside class="sidebar">
            
            <!-- Paper Section -->
            <div class="panel">
                <div class="panel-title"><span>📄</span> إعدادات الورقة</div>
                <div class="preset-grid">
                    <div class="chip active" data-type="A4" onclick="setPaper('A4', this)">A4</div>
                    <div class="chip" data-type="A3" onclick="setPaper('A3', this)">A3</div>
                    <div class="chip" data-type="A5" onclick="setPaper('A5', this)">A5</div>
                    <div class="chip" data-type="Letter" onclick="setPaper('Letter', this)">Letter</div>
                    <div class="chip" onclick="setPaper('Custom', this)">مخصص</div>
                </div>
                
                <div class="input-group" style="margin-bottom:10px">
                    <button class="btn btn-outline" style="width:100%; justify-content:center" onclick="optimizeLayout()">
                        <span>⚡</span> التوزيع الذكي (توفير الورق)
                    </button>
                </div>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>العرض (مم)</label>
                        <input type="number" id="paper-w" value="210" oninput="updateUI()">
                    </div>
                    <div class="input-group">
                        <label>الارتفاع (مم)</label>
                        <input type="number" id="paper-h" value="297" oninput="updateUI()">
                    </div>
                </div>

                <div class="input-group">
                    <label>الاتجاه</label>
                    <select id="orientation" onchange="updateUI()">
                        <option value="portrait">عمودي (Portrait)</option>
                        <option value="landscape">أفقي (Landscape)</option>
                    </select>
                </div>

                <div style="margin-top:1rem;">
                    <label style="font-size:0.8rem; color:var(--text-muted);">الهوامش (مم)</label>
                    <div class="form-grid" style="margin-top:5px;">
                        <input type="number" id="m-top" value="10" placeholder="علوي" oninput="updateUI()">
                        <input type="number" id="m-bottom" value="10" placeholder="سفلي" oninput="updateUI()">
                        <input type="number" id="m-right" value="10" placeholder="يمين" oninput="updateUI()">
                        <input type="number" id="m-left" value="10" placeholder="يسار" oninput="updateUI()">
                    </div>
                </div>
            </div>

            <!-- Templates Section -->
            <div class="panel">
                <div class="panel-title"><span>🎯</span> قوالب الصور الجاهزة</div>
                <div class="preset-grid">
                    <div class="chip" onclick="applyTemplate(35, 45)">جواز سفر (35x45)</div>
                    <div class="chip" onclick="applyTemplate(85, 55)">بطاقة (85x55)</div>
                    <div class="chip" onclick="applyTemplate(100, 150)">صورة 10x15</div>
                    <div class="chip" onclick="applyTemplate(20, 20)">طابع (20x20)</div>
                </div>
            </div>

            <!-- Image Settings -->
            <div class="panel">
                <div class="panel-title"><span>🖼️</span> أبعاد الصور</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>عرض الصورة (مم)</label>
                        <input type="number" id="img-w" value="35" oninput="updateUI()">
                    </div>
                    <div class="input-group">
                        <label>ارتفاع الصورة (مم)</label>
                        <input type="number" id="img-h" value="45" oninput="updateUI()">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>المسافة (مم)</label>
                        <input type="number" id="gap" value="3" step="0.5" oninput="updateUI()">
                    </div>
                    <div class="input-group">
                        <label>طريقة الملء</label>
                        <select id="fit" onchange="updateUI()">
                            <option value="cover">قص (Cover)</option>
                            <option value="contain">احتواء (Contain)</option>
                            <option value="fill">تمدد (Stretch)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group" style="flex-direction:row; align-items:center; gap:8px;">
                    <input type="checkbox" id="show-crop" onchange="updateUI()" style="width:auto">
                    <label style="margin:0">إضافة علامات القص (Crop Marks)</label>
                </div>
            </div>

            <!-- Border Settings -->
            <div class="panel">
                <div class="panel-title"><span>🔲</span> الإطار والزوايا</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>سُمك الإطار (مم)</label>
                        <input type="number" id="b-width" value="0.2" step="0.1" oninput="updateUI()">
                    </div>
                    <div class="input-group">
                        <label>لون الإطار</label>
                        <input type="color" id="b-color" value="#000000" oninput="updateUI()">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>نمط الإطار</label>
                        <select id="b-style" onchange="updateUI()">
                            <option value="solid">متصل</option>
                            <option value="dashed">متقطع</option>
                            <option value="dotted">منقط</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>انحناء الزوايا (مم)</label>
                        <input type="number" id="radius" value="0" step="0.5" oninput="updateUI()">
                    </div>
                </div>
            </div>

            <!-- Upload Section -->
            <div class="panel">
                <div class="panel-title"><span>📤</span> رفع الصور</div>
                <div class="upload-box" onclick="document.getElementById('file-input').click()" id="drop-zone">
                    <i>📁</i>
                    <p>اسحب الصور هنا أو اضغط للاختيار</p>
                    <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
                </div>
                <div class="image-manager" id="image-list">
                    <!-- Images will appear here -->
                </div>
            </div>

        </aside>

        <!-- Preview Area -->
        <section class="preview-pane">
            <div class="preview-controls">
                <button class="zoom-btn" onclick="changeZoom(-10)">−</button>
                <span id="zoom-text">80%</span>
                <button class="zoom-btn" onclick="changeZoom(10)">+</button>
            </div>
            
            <div id="pages-container" style="display: flex; flex-direction: column; gap: 40px; align-items: center;">
                <!-- Pages will be rendered here -->
                <div id="paper" class="paper-canvas">
                    <div id="paper-content" class="paper-grid"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div>الصور: <span id="stat-count">0</span></div>
        <div>المساحة المستخدمة: <span id="stat-usage">0%</span></div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader"></div>
        <h2 style="color:white">جاري إنشاء المستخلص...</h2>
    </div>

    <script>
        // State
        let images = [];
        let zoom = 80;
        const MM_TO_PX = 3.78; // Approximate for screen preview

        const presets = {
            'A4': [210, 297],
            'A3': [297, 420],
            'A5': [148, 210],
            'Letter': [216, 279]
        };

        // Initialize
        function init() {
            updateUI();
            
            // Drag and drop events
            const dz = document.getElementById('drop-zone');
            dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = 'var(--primary)'; });
            dz.addEventListener('dragleave', () => { dz.style.borderColor = 'var(--glass-border)'; });
            dz.addEventListener('drop', (e) => {
                e.preventDefault();
                dz.style.borderColor = 'var(--glass-border)';
                handleFiles(e.dataTransfer.files);
            });
        }

        function setPaper(type, el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            if (type !== 'Custom') {
                document.getElementById('paper-w').value = presets[type][0];
                document.getElementById('paper-h').value = presets[type][1];
            }
            updateUI();
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    images.push({
                        id: Date.now() + Math.random(),
                        src: e.target.result,
                        name: file.name,
                        size: (file.size / 1024).toFixed(1) + ' KB',
                        copies: 1,
                        text: '',
                        textColor: '#ffffff',
                        textSize: 12,
                        textPos: 'pos-bottom',
                        showNum: false,
                        bright: 100,
                        gray: false,
                        qr: '',
                        frame: ''
                    });
                    renderImageList();
                    updateUI();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderImageList() {
            const list = document.getElementById('image-list');
            list.innerHTML = images.map((img, idx) => `
                <div class="image-row">
                    <div class="image-row-main">
                        <img src="${img.src}">
                        <div class="name">
                            <div>${img.name}</div>
                            <div style="font-size:0.65rem; color:var(--text-muted)">${img.size}</div>
                            <button class="chip" style="margin-top:4px; padding:2px 6px;" onclick="toggleTextPanel(${idx})">📝 نص / ترقيم</button>
                        </div>
                        <input type="number" class="copies-input" value="${img.copies}" min="1" onchange="updateCopies(${idx}, this.value)">
                        <button class="remove-btn" onclick="removeImage(${idx})">×</button>
                    </div>
                    
                    <div class="text-settings-panel" id="text-panel-${idx}">
                        <div class="input-group">
                            <label>النص</label>
                            <input type="text" value="${img.text}" oninput="updateImageProp(${idx}, 'text', this.value)">
                        </div>
                        <div class="input-group">
                            <label>التموضع</label>
                            <select onchange="updateImageProp(${idx}, 'textPos', this.value)">
                                <option value="pos-bottom" ${img.textPos === 'pos-bottom' ? 'selected' : ''}>أسفل</option>
                                <option value="pos-top" ${img.textPos === 'pos-top' ? 'selected' : ''}>أعلى</option>
                                <option value="pos-center" ${img.textPos === 'pos-center' ? 'selected' : ''}>منتصف</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>السطوع</label>
                            <input type="range" min="50" max="150" value="${img.bright || 100}" oninput="updateImageProp(${idx}, 'bright', this.value)">
                        </div>
                        <div class="input-group">
                            <label>أبيض وأسود</label>
                            <input type="checkbox" ${img.gray ? 'checked' : ''} onchange="updateImageProp(${idx}, 'gray', this.checked)">
                        </div>
                        <div class="input-group">
                            <label>QR Code</label>
                            <input type="text" value="${img.qr || ''}" placeholder="رابط الـ QR" oninput="updateImageProp(${idx}, 'qr', this.value)">
                        </div>
                        <div class="input-group">
                            <label>إطار الجهاز</label>
                            <select onchange="updateImageProp(${idx}, 'frame', this.value)">
                                <option value="" ${!img.frame ? 'selected' : ''}>بدون إطار</option>
                                <option value="iphone" ${img.frame === 'iphone' ? 'selected' : ''}>iPhone 17 Pro Max</option>
                                <option value="macbook" ${img.frame === 'macbook' ? 'selected' : ''}>MacBook Pro</option>
                                <option value="polaroid" ${img.frame === 'polaroid' ? 'selected' : ''}>Polaroid</option>
                            </select>
                        </div>
                        <div class="input-group" style="flex-direction:row; align-items:center; gap:8px;">
                            <input type="checkbox" ${img.showNum ? 'checked' : ''} onchange="updateImageProp(${idx}, 'showNum', this.checked)" style="width:auto">
                            <label style="margin:0">ترقيم</label>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleTextPanel(idx) {
            const panel = document.getElementById(`text-panel-${idx}`);
            panel.classList.toggle('active');
        }

        function updateImageProp(idx, key, val) {
            images[idx][key] = val;
            updateUI();
        }

        function applyTemplate(w, h) {
            document.getElementById('img-w').value = w;
            document.getElementById('img-h').value = h;
            updateUI();
        }

        function updateCopies(idx, val) {
            images[idx].copies = parseInt(val) || 1;
            updateUI();
        }

        function removeImage(idx) {
            images.splice(idx, 1);
            renderImageList();
            updateUI();
        }

        function changeZoom(delta) {
            zoom = Math.max(10, Math.min(200, zoom + delta));
            document.getElementById('zoom-text').textContent = `${zoom}%`;
            document.getElementById('paper').style.transform = `scale(${zoom / 100})`;
        }

        function updateUI() {
            const pw = parseFloat(document.getElementById('paper-w').value);
            const ph = parseFloat(document.getElementById('paper-h').value);
            const orient = document.getElementById('orientation').value;
            let finalW = orient === 'portrait' ? Math.min(pw, ph) : Math.max(pw, ph);
            let finalH = orient === 'portrait' ? Math.max(pw, ph) : Math.min(pw, ph);

            const mt = parseFloat(document.getElementById('m-top').value);
            const mb = parseFloat(document.getElementById('m-bottom').value);
            const mr = parseFloat(document.getElementById('m-right').value);
            const ml = parseFloat(document.getElementById('m-left').value);

            const iw = parseFloat(document.getElementById('img-w').value);
            const ih = parseFloat(document.getElementById('img-h').value);
            const gap = parseFloat(document.getElementById('gap').value);
            const fit = document.getElementById('fit').value;
            const showCrop = document.getElementById('show-crop').checked;

            const bw = parseFloat(document.getElementById('b-width').value);
            const bc = document.getElementById('b-color').value;
            const bs = document.getElementById('b-style').value;
            const br = parseFloat(document.getElementById('radius').value);

            const container = document.getElementById('pages-container');
            container.innerHTML = '';

            let totalImagesCount = 0;
            images.forEach(img => totalImagesCount += img.copies);

            // Calculate how many images per page
            const availW = finalW - ml - mr;
            const availH = finalH - mt - mb;
            const cols = Math.floor((availW + gap) / (iw + gap));
            const rows = Math.floor((availH + gap) / (ih + gap));
            const perPage = Math.max(1, cols * rows);
            const pagesCount = Math.ceil(totalImagesCount / perPage) || 1;

            let imageIdx = 0;
            let imageCopyIdx = 0;
            let globalCounter = 1;

            for (let p = 0; p < pagesCount; p++) {
                const page = document.createElement('div');
                page.className = 'paper-canvas';
                page.style.width = (finalW * MM_TO_PX) + 'px';
                page.style.height = (finalH * MM_TO_PX) + 'px';
                page.style.transform = `scale(${zoom / 100})`;
                page.style.marginBottom = (40 * (zoom/100)) + 'px';

                const content = document.createElement('div');
                content.className = 'paper-grid' + (showCrop ? ' show-crop-marks' : '');
                content.style.padding = `${mt * MM_TO_PX}px ${mr * MM_TO_PX}px ${mb * MM_TO_PX}px ${ml * MM_TO_PX}px`;
                content.style.gap = (gap * MM_TO_PX) + 'px';
                content.style.setProperty('--mt', (mt * MM_TO_PX) + 'px');
                content.style.setProperty('--mb', (mb * MM_TO_PX) + 'px');
                content.style.setProperty('--ml', (ml * MM_TO_PX) + 'px');
                content.style.setProperty('--mr', (mr * MM_TO_PX) + 'px');

                for (let i = 0; i < perPage && imageIdx < images.length; i++) {
                    const img = images[imageIdx];
                    
                    const cell = document.createElement('div');
                    cell.className = 'img-cell';
                    cell.style.width = (iw * MM_TO_PX) + 'px';
                    cell.style.height = (ih * MM_TO_PX) + 'px';
                    cell.style.border = `${bw * MM_TO_PX}px ${bs} ${bc}`;
                    cell.style.borderRadius = (br * MM_TO_PX) + 'px';
                    cell.style.position = 'relative';

                    // Crop Marks
                    cell.innerHTML = `
                        <div class="crop-mark cm-tl"></div><div class="crop-mark cm-tr"></div>
                        <div class="crop-mark cm-bl"></div><div class="crop-mark cm-br"></div>
                    `;
                    
                    const elContainer = document.createElement('div');
                    elContainer.className = 'img-with-frame';
                    
                    const el = document.createElement('img');
                    el.src = img.src;
                    el.style.objectFit = fit;
                    el.style.filter = `brightness(${img.bright}%) grayscale(${img.gray ? 1 : 0})`;
                    
                    // Apply frame-specific padding/clipping to fit image inside screen
                    if (img.frame === 'iphone') {
                        el.style.width = '90%';
                        el.style.height = '94%';
                        el.style.borderRadius = '30px';
                        const frameImg = document.createElement('img');
                        frameImg.src = 'iphone_frame.png';
                        frameImg.className = 'device-frame';
                        elContainer.appendChild(frameImg);
                    } else if (img.frame === 'macbook') {
                        el.style.width = '76%';
                        el.style.height = '78%';
                        el.style.top = '10%';
                        const frameImg = document.createElement('img');
                        frameImg.src = 'macbook_frame.png';
                        frameImg.className = 'device-frame';
                        elContainer.appendChild(frameImg);
                    } else if (img.frame === 'polaroid') {
                        el.style.width = '84%';
                        el.style.height = '72%';
                        el.style.top = '8%';
                        const frameImg = document.createElement('img');
                        frameImg.src = 'polaroid_frame.png';
                        frameImg.className = 'device-frame';
                        elContainer.appendChild(frameImg);
                    }

                    elContainer.appendChild(el);
                    cell.appendChild(elContainer);

                    // Text
                    if (img.text || img.showNum) {
                        const label = document.createElement('div');
                        label.className = `img-label ${img.textPos}`;
                        label.style.color = img.textColor;
                        label.style.fontSize = (img.textSize * (zoom/100)) + 'px';
                        label.textContent = (img.text || '') + (img.showNum ? ' ' + globalCounter : '');
                        cell.appendChild(label);
                    }

                    // QR
                    if (img.qr) {
                        const qrDiv = document.createElement('div');
                        qrDiv.className = 'qr-overlay';
                        qrDiv.style.width = '20%';
                        qrDiv.style.height = '20%';
                        qrDiv.style.bottom = '5px';
                        qrDiv.style.right = '5px';
                        cell.appendChild(qrDiv);
                        new QRCode(qrDiv, { text: img.qr, width: 64, height: 64 });
                    }

                    content.appendChild(cell);
                    
                    imageCopyIdx++;
                    globalCounter++;
                    if (imageCopyIdx >= img.copies) {
                        imageIdx++;
                        imageCopyIdx = 0;
                    }
                }
                page.appendChild(content);
                container.appendChild(page);
            }

            document.getElementById('stat-count').textContent = totalImagesCount;
            const usage = Math.min(100, Math.round(((totalImagesCount * iw * ih) / (finalW * finalH * pagesCount)) * 100));
            document.getElementById('stat-usage').textContent = `${usage}%`;
        }

        async function exportPDF() {
            if (images.length === 0) return alert('الرجاء رفع بعض الصور أولاً');
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';

            const pw = parseFloat(document.getElementById('paper-w').value);
            const ph = parseFloat(document.getElementById('paper-h').value);
            const orient = document.getElementById('orientation').value;
            let finalW = orient === 'portrait' ? Math.min(pw, ph) : Math.max(pw, ph);
            let finalH = orient === 'portrait' ? Math.max(pw, ph) : Math.min(pw, ph);

            const opt = {
                margin: 0,
                filename: `Project_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: [finalW, finalH], orientation: orient }
            };

            const pdf = html2pdf().set(opt).from(document.querySelector('.paper-canvas')); // Initial
            
            // For multi-page, we use a different approach with html2pdf
            const pages = document.querySelectorAll('.paper-canvas');
            let worker = html2pdf().set(opt).from(pages[0]).toPdf();
            
            for(let i=1; i < pages.length; i++) {
                worker = worker.get('pdf').then(pdf => {
                    pdf.addPage();
                }).from(pages[i]).toContainer().toCanvas().toImg().toPdf();
            }

            try {
                await worker.save();
            } finally {
                overlay.style.display = 'none';
            }
        }

        function saveProject() {
            const data = {
                settings: {
                    paperW: document.getElementById('paper-w').value,
                    paperH: document.getElementById('paper-h').value,
                    orient: document.getElementById('orientation').value,
                    imgW: document.getElementById('img-w').value,
                    imgH: document.getElementById('img-h').value,
                    gap: document.getElementById('gap').value,
                    fit: document.getElementById('fit').value,
                    showCrop: document.getElementById('show-crop').checked
                },
                images: images
            };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `PrintFlow_Project_${Date.now()}.json`;
            a.click();
        }

        function loadProject(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                document.getElementById('paper-w').value = data.settings.paperW;
                document.getElementById('paper-h').value = data.settings.paperH;
                document.getElementById('orientation').value = data.settings.orient;
                document.getElementById('img-w').value = data.settings.imgW;
                document.getElementById('img-h').value = data.settings.imgH;
                document.getElementById('gap').value = data.settings.gap;
                document.getElementById('fit').value = data.settings.fit;
                document.getElementById('show-crop').checked = data.settings.showCrop;
                images = data.images;
                renderImageList();
                updateUI();
            };
            reader.readAsText(file);
        }

        function optimizeLayout() {
            const pw = parseFloat(document.getElementById('paper-w').value);
            const ph = parseFloat(document.getElementById('paper-h').value);
            const iw = parseFloat(document.getElementById('img-w').value);
            const ih = parseFloat(document.getElementById('img-h').value);
            const gap = parseFloat(document.getElementById('gap').value);

            const fitP = Math.floor((pw + gap) / (iw + gap)) * Math.floor((ph + gap) / (ih + gap));
            const fitL = Math.floor((ph + gap) / (iw + gap)) * Math.floor((pw + gap) / (ih + gap));

            document.getElementById('orientation').value = fitL > fitP ? 'landscape' : 'portrait';
            updateUI();
        }

        function resetAll() {
            if(confirm('هل تريد مسح جميع البيانات؟')) {
                images = [];
                renderImageList();
                updateUI();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
